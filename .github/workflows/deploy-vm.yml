name: Deploy to Azure VM

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy WaveStack
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        run: |
          test -n "${{ secrets.VM_HOST }}" || { echo "Missing VM_HOST secret"; exit 1; }
          test -n "${{ secrets.VM_USER }}" || { echo "Missing VM_USER secret"; exit 1; }
          test -n "${{ secrets.VM_SSH_PRIVATE_KEY_B64 }}" || { echo "Missing VM_SSH_PRIVATE_KEY_B64 secret"; exit 1; }

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY_B64 }}" | base64 -d > ~/.ssh/wavestack_deploy
          chmod 600 ~/.ssh/wavestack_deploy
          ssh-keygen -y -f ~/.ssh/wavestack_deploy > /dev/null

      - name: Add VM host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -T 30 -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/wavestack_deploy \
            "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}" \
            "echo SSH connection works && whoami && hostname"

      - name: Upload source to VM
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude "dist" \
            --exclude "build" \
            --exclude "coverage" \
            --exclude ".env" \
            --exclude "secrets" \
            --exclude "response.json" \
            --exclude "services/graphql-api/.cache" \
            -e "ssh -i ~/.ssh/wavestack_deploy" \
            ./ "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/home/${{ secrets.VM_USER }}/WaveStack/"

      - name: Rebuild and restart containers
        run: |
          ssh -i ~/.ssh/wavestack_deploy "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}" <<'REMOTE'
          set -e
          cd ~/WaveStack

          test -f .env || {
            echo "Missing ~/WaveStack/.env on VM"
            exit 1
          }

          # Inject Groq secrets into .env (if GitHub secret is set)
          if [ -n "${{ secrets.GROQ_API_KEY }}" ]; then sed -i '/^GROQ_API_KEY=/d' .env; echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY}}" >> .env; fi
          if [ -n "${{ secrets.GROQ_API_KEY1 }}" ]; then sed -i '/^GROQ_API_KEY1=/d' .env; echo "GROQ_API_KEY1=${{ secrets.GROQ_API_KEY1}}" >> .env; fi
          if [ -n "${{ secrets.GROQ_API_KEY2 }}" ]; then sed -i '/^GROQ_API_KEY2=/d' .env; echo "GROQ_API_KEY2=${{ secrets.GROQ_API_KEY2}}" >> .env; fi
          if [ -n "${{ secrets.GROQ_API_KEY3 }}" ]; then sed -i '/^GROQ_API_KEY3=/d' .env; echo "GROQ_API_KEY3=${{ secrets.GROQ_API_KEY3}}" >> .env; fi
          if [ -n "${{ secrets.GROQ_API_KEY4 }}" ]; then sed -i '/^GROQ_API_KEY4=/d' .env; echo "GROQ_API_KEY4=${{ secrets.GROQ_API_KEY4}}" >> .env; fi
          if [ -n "${{ secrets.GROQ_API_KEY5 }}" ]; then sed -i '/^GROQ_API_KEY5=/d' .env; echo "GROQ_API_KEY5=${{ secrets.GROQ_API_KEY5}}" >> .env; fi
          if [ -n "${{ secrets.GROQ_API_KEY6 }}" ]; then sed -i '/^GROQ_API_KEY6=/d' .env; echo "GROQ_API_KEY6=${{ secrets.GROQ_API_KEY6}}" >> .env; fi
          if [ -n "${{ secrets.GROQ_API_KEY7 }}" ]; then sed -i '/^GROQ_API_KEY7=/d' .env; echo "GROQ_API_KEY7=${{ secrets.GROQ_API_KEY7}}" >> .env; fi
          if [ -n "${{ secrets.GROQ_API_KEY8 }}" ]; then sed -i '/^GROQ_API_KEY8=/d' .env; echo "GROQ_API_KEY8=${{ secrets.GROQ_API_KEY8}}" >> .env; fi
          if [ -n "${{ secrets.GROQ_API_KEY9 }}" ]; then sed -i '/^GROQ_API_KEY9=/d' .env; echo "GROQ_API_KEY9=${{ secrets.GROQ_API_KEY9}}" >> .env; fi
          if [ -n "${{ secrets.GROQ_MODEL }}" ]; then sed -i '/^GROQ_MODEL=/d' .env; echo "GROQ_MODEL=${{ secrets.GROQ_MODEL}}" >> .env; fi

          sudo docker compose config >/dev/null
          sudo docker compose up --build -d
          sudo docker compose ps
          REMOTE
  deploy_oracle_standby:
    name: Update Oracle Standby
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Oracle deployment secrets
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_VM_HOST }}
          ORACLE_USER: ${{ secrets.ORACLE_VM_USER }}
          ORACLE_KEY_B64: ${{ secrets.ORACLE_VM_SSH_PRIVATE_KEY_B64 }}
        run: |
          test -n "$ORACLE_HOST" || {
            echo "Missing ORACLE_VM_HOST secret"
            exit 1
          }

          test -n "$ORACLE_USER" || {
            echo "Missing ORACLE_VM_USER secret"
            exit 1
          }

          test -n "$ORACLE_KEY_B64" || {
            echo "Missing ORACLE_VM_SSH_PRIVATE_KEY_B64 secret"
            exit 1
          }

      - name: Write Oracle SSH key
        env:
          ORACLE_KEY_B64: ${{ secrets.ORACLE_VM_SSH_PRIVATE_KEY_B64 }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$ORACLE_KEY_B64" |
            base64 -d > ~/.ssh/wavestack_oracle_actions

          chmod 600 ~/.ssh/wavestack_oracle_actions

          ssh-keygen -y \
            -f ~/.ssh/wavestack_oracle_actions \
            > /dev/null

      - name: Add Oracle host key
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_VM_HOST }}
        run: |
          mkdir -p ~/.ssh

          ssh-keyscan \
            -T 30 \
            -H "$ORACLE_HOST" \
            >> ~/.ssh/known_hosts

      - name: Test Oracle SSH connection
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_VM_HOST }}
          ORACLE_USER: ${{ secrets.ORACLE_VM_USER }}
        run: |
          ssh \
            -i ~/.ssh/wavestack_oracle_actions \
            "$ORACLE_USER@$ORACLE_HOST" \
            "echo 'Oracle SSH works' && whoami && hostname"

      - name: Upload source to Oracle
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_VM_HOST }}
          ORACLE_USER: ${{ secrets.ORACLE_VM_USER }}
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude "dist" \
            --exclude "build" \
            --exclude "coverage" \
            --exclude ".env" \
            --exclude "secrets" \
            --exclude "response.json" \
            --exclude "services/graphql-api/.cache" \
            -e "ssh -i ~/.ssh/wavestack_oracle_actions" \
            ./ \
            "$ORACLE_USER@$ORACLE_HOST:/home/$ORACLE_USER/WaveStack/"

      - name: Build Oracle standby containers
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_VM_HOST }}
          ORACLE_USER: ${{ secrets.ORACLE_VM_USER }}
        run: |
          ssh \
            -i ~/.ssh/wavestack_oracle_actions \
            "$ORACLE_USER@$ORACLE_HOST" <<'REMOTE'
          set -euo pipefail

          cd ~/WaveStack

          test -f .env || {
            echo "Missing ~/WaveStack/.env on Oracle"
            exit 1
          }

          sudo docker compose config >/dev/null

          # Build the latest version, but do not activate Oracle yet.
          sudo docker compose build

          printf '%s\n' "Standby code built successfully at $(date -Is)" \
            > .oracle-standby-ready

          sudo docker compose ps
          REMOTE

      - name: Remove deployment key
        if: always()
        run: |
          rm -f ~/.ssh/wavestack_oracle_actions
