apiVersion: v1
kind: ConfigMap
metadata:
  name: wavestack-config
  namespace: wavestack
data:
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: wavestack
  POSTGRES_USER: wavestack
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
  AUDIO_SERVICE_URL: http://audio-ai-service:8000
  ANALYTICS_SERVICE_URL: http://analytics-service:8080
  STORAGE_CONTAINER: tracks
  STREAM_TOKEN_TTL_SECONDS: "900"
