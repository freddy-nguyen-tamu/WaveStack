apiVersion: apps/v1
kind: Deployment
metadata:
  name: audio-ai-service
  namespace: wavestack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: audio-ai-service
  template:
    metadata:
      labels:
        app: audio-ai-service
    spec:
      containers:
        - name: audio-ai-service
          image: wavestack.azurecr.io/audio-ai-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: wavestack-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: audio-ai-service
  namespace: wavestack
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: audio-ai-service
