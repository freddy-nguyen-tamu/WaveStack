apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: wavestack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: wavestack.azurecr.io/frontend:latest
          ports:
            - containerPort: 5173
          env:
            - name: VITE_GRAPHQL_URL
              value: https://wavestack.example.com/graphql
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: wavestack
spec:
  ports:
    - port: 80
      targetPort: 5173
  selector:
    app: frontend
