apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: wavestack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: wavestack.azurecr.io/analytics-service:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: wavestack
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: analytics-service
