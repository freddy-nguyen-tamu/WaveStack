apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wavestack
  namespace: wavestack
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  tls:
    - hosts:
        - wavestack.example.com
      secretName: wavestack-tls
  rules:
    - host: wavestack.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /graphql
            pathType: Prefix
            backend:
              service:
                name: graphql-api
                port:
                  number: 3000
