<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>WaveStack | Cloud Music Streaming Platform</title>

    <meta
      name="description"
      content="WaveStack is a cloud-native music streaming platform for searching, playing, favoriting, queuing, and organizing your music library."
    />

    <meta
      name="application-name"
      content="WaveStack"
    />

    <meta
      name="robots"
      content="index, follow"
    />

    <meta
      name="theme-color"
      content="#ffffff"
    />

    <meta
      property="og:type"
      content="website"
    />

    <meta
      property="og:site_name"
      content="WaveStack"
    />

    <meta
      property="og:title"
      content="WaveStack | Cloud Music Streaming Platform"
    />

    <meta
      property="og:description"
      content="Search, play, favorite, queue, and organize your cloud music library with WaveStack."
    />

    <meta
      property="og:url"
      content="https://wavestack.duckdns.org/"
    />

    <meta
      name="twitter:card"
      content="summary"
    />

    <link
      rel="canonical"
      href="https://wavestack.duckdns.org/"
    />

    <link
      rel="icon"
      type="image/x-icon"
      href="/favicon.ico"
    />
  </head>
  <body>
    <div id="root">
      <header class="static-app-header">
        <p class="static-app-brand">WaveStack</p>
        <p>Cloud-native music streaming platform</p>
      </header>

      <nav class="static-app-nav" aria-label="Primary navigation">
        <a href="/">Home</a>
        <a href="/all">Library</a>
        <a href="/search">Search</a>
        <a href="/playlists">Playlists</a>
      </nav>

      <main class="static-app-main">
        <h1>WaveStack music library</h1>
        <p>
          Search, play, favorite, queue, and organize your cloud music library.
          JavaScript is required for the full interactive music player.
        </p>
      </main>
    </div>

    <script
      type="module"
      src="/src/main.tsx"
    ></script>
  </body>
</html>
