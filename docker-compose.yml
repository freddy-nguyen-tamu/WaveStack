services:
  frontend:
    build:
      context: ./apps/frontend
      args:
        VITE_GRAPHQL_URL: ${VITE_GRAPHQL_URL:-http://localhost:3000/graphql}
    ports:
      - "5173:5173"
    environment:
      VITE_GRAPHQL_URL: ${VITE_GRAPHQL_URL:-http://localhost:3000/graphql}
    depends_on:
      - graphql-api

  graphql-api:
    build:
      context: ./services/graphql-api
    ports:
      - "3000:3000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: wavestack
      POSTGRES_USER: wavestack
      POSTGRES_PASSWORD: wavestack_dev_password
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: wavestack_graph_password
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      AUDIO_SERVICE_URL: http://audio-ai-service:8000
      ANALYTICS_SERVICE_URL: http://analytics-service:8080
      SIGNED_URL_SECRET: local-dev-secret
      GOOGLE_DRIVE_API_KEY: ${GOOGLE_DRIVE_API_KEY}
      GOOGLE_DRIVE_FOLDER_IDS: ${GOOGLE_DRIVE_FOLDER_IDS}
      API_PUBLIC_ORIGIN: ${API_PUBLIC_ORIGIN:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-replace-with-real-jwt-secret-in-production}
      LISTENING_HABITS_GOOGLE_DRIVE_FOLDER_ID: ${LISTENING_HABITS_GOOGLE_DRIVE_FOLDER_ID:-TODO_FILL_LATER}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/app/secrets/google-drive-service-account.json}
      GOOGLE_DRIVE_PRIVATE_EXPORT_ENABLED: ${GOOGLE_DRIVE_PRIVATE_EXPORT_ENABLED:-false}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      GOOGLE_OAUTH_CALLBACK_URL: ${GOOGLE_OAUTH_CALLBACK_URL:-http://localhost:3000/auth/google/callback}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      FRONTEND_PUBLIC_ORIGIN: ${FRONTEND_PUBLIC_ORIGIN:-http://localhost:5173}
      DRIVE_TRACK_SYNC_THUMBNAIL_DIR: ${DRIVE_TRACK_SYNC_THUMBNAIL_DIR:-/app/.cache/thumbnails}
      DRIVE_TRACK_SYNC_THUMBNAIL_PUBLIC_PATH: ${DRIVE_TRACK_SYNC_THUMBNAIL_PUBLIC_PATH:-/drive/assets/thumbnails}
      DRIVE_TRACK_SYNC_PAGE_SIZE: ${DRIVE_TRACK_SYNC_PAGE_SIZE:-100}
      DASHBOARD_RECOMMENDATION_LIMIT: ${DASHBOARD_RECOMMENDATION_LIMIT:-40}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_API_KEY1: ${GROQ_API_KEY1:-}
      GROQ_API_KEY2: ${GROQ_API_KEY2:-}
      GROQ_API_KEY3: ${GROQ_API_KEY3:-}
      GROQ_API_KEY4: ${GROQ_API_KEY4:-}
      GROQ_API_KEY5: ${GROQ_API_KEY5:-}
      GROQ_API_KEY6: ${GROQ_API_KEY6:-}
      GROQ_API_KEY7: ${GROQ_API_KEY7:-}
      GROQ_API_KEY8: ${GROQ_API_KEY8:-}
      GROQ_API_KEY9: ${GROQ_API_KEY9:-}
    volumes:
      - ./secrets:/app/secrets:ro
      - ./services/graphql-api/.cache:/app/.cache
    depends_on:
      - postgres
      - neo4j
      - rabbitmq
      - audio-ai-service
      - analytics-service

  audio-ai-service:
    build:
      context: ./services/audio-ai-service
    ports:
      - "8000:8000"
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      - rabbitmq

  analytics-service:
    build:
      context: ./services/analytics-service
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: wavestack
      POSTGRES_USER: wavestack
      POSTGRES_PASSWORD: wavestack_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/migrations:/docker-entrypoint-initdb.d:ro

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/wavestack_graph_password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"
    command: "azurite-blob --blobHost 0.0.0.0"

volumes:
  postgres-data:
  neo4j-data:
